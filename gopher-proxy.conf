# gopher-proxy.conf — configuration for gopher-http-proxy
#
# Two sections:
#
#   [header]   Lines of ASCII art / info text displayed at the top of the
#              root gophermap as Gopher type 'i' (info) items.
#
#   [urls]     One proxied URL per line.  Format:
#                 Display Label | https://host/path/
#              A bare URL with no '|' uses the URL itself as the label.
#
# Lines starting with '#' and blank lines are ignored.

[header]
  __ _  ___  _ __  | _ __ _ __ _____  ___   _
 / _` + "`" + ` |/ _ \| '_ \ | '_ \| '__/ _ \ \
| (_| | (_) | |_) || |_) | | | (_) >  <| |_| |
 \__, |\___/| .__/ | .__/|_|  \___/_/\_\\__, |
  |___/     |_|    |_|                  |___/
Welcome to the Gopher HTTP proxy.

[urls]
Software archive    | https://bitsavers.org/bits/
Computing archive   | https://bitsavers.org/pdf/
Communications archive   | https://bitsavers.org/communications/
Components archive   | https://bitsavers.org/components/
Magazines archive   | https://bitsavers.org/magazines/
Test Equipment archive   | https://bitsavers.org/test_equipment/
GNU FTP archive          | https://ftp.gnu.org/gnu/
