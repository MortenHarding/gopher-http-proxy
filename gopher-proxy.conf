# gopher-proxy.conf — configuration for gopher-http-proxy
#
# Two sections:
#
#   [header]   Lines of ASCII art / info text displayed at the top of the
#              root gophermap as Gopher type 'i' (info) items.
#
#   [urls]     One proxied URL per line.  Format:
#                 Display Label | https://host/path/
#              A bare URL with no '|' uses the URL itself as the label.
#
#              URLs can be organised into named groups.  Start a group with
#              a title line followed immediately by the separator line:
#
#                 My Group Title
#                 _______________________________
#                 Label A  | https://example.org/a/
#                 Label B  | https://example.org/b/
#
#              Separate groups with a blank line.
#              URLs listed before any group title form an anonymous group.
#
# Lines starting with '#' and blank lines are ignored.

[header]
                  __               
|__| |_ |_  _    |__)  _  _        
|  | |_ |_ |_)   |    |  (_) )( \/ 
           |                    /  
Gopherspace.dk HTTP proxy

